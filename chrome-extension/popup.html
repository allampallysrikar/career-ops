<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobForge Capture</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f10;
      color: #e8e8e8;
    }

    .header {
      padding: 16px;
      border-bottom: 1px solid #2a2a2e;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }

    .header p {
      font-size: 11px;
      color: #888;
      margin-top: 1px;
    }

    .content { padding: 16px; }

    .job-info {
      background: #1a1a1d;
      border: 1px solid #2a2a2e;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 14px;
    }

    .job-title {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .job-company {
      font-size: 12px;
      color: #a78bfa;
      margin-bottom: 2px;
    }

    .job-url {
      font-size: 10px;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn-capture {
      width: 100%;
      padding: 10px 16px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-capture:hover { opacity: 0.9; }
    .btn-capture:disabled { opacity: 0.5; cursor: not-allowed; }

    .status {
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      display: none;
    }

    .status.success {
      background: #052e16;
      border: 1px solid #166534;
      color: #86efac;
      display: block;
    }

    .status.error {
      background: #2d0f0f;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      display: block;
    }

    .status.loading {
      background: #1e1b4b;
      border: 1px solid #3730a3;
      color: #a5b4fc;
      display: block;
    }

    .server-warning {
      margin-top: 10px;
      padding: 8px 12px;
      background: #2d1f00;
      border: 1px solid #92400e;
      border-radius: 6px;
      font-size: 11px;
      color: #fbbf24;
    }

    .server-warning code {
      background: #1a1200;
      padding: 1px 4px;
      border-radius: 3px;
      font-family: monospace;
    }

    .divider {
      border: none;
      border-top: 1px solid #2a2a2e;
      margin: 14px 0;
    }

    .quick-stats {
      display: flex;
      gap: 8px;
    }

    .stat {
      flex: 1;
      background: #1a1a1d;
      border: 1px solid #2a2a2e;
      border-radius: 6px;
      padding: 8px;
      text-align: center;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 700;
      color: #a78bfa;
    }

    .stat-label {
      font-size: 10px;
      color: #666;
      margin-top: 2px;
    }

    .settings-link {
      display: block;
      text-align: center;
      color: #666;
      font-size: 11px;
      text-decoration: none;
      margin-top: 10px;
    }

    .settings-link:hover { color: #a78bfa; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🎯</div>
    <div>
      <h1>JobForge</h1>
      <p>Job capture & pipeline</p>
    </div>
  </div>

  <div class="content">
    <div class="job-info" id="jobInfo">
      <div class="job-title" id="jobTitle">Detecting job listing...</div>
      <div class="job-company" id="jobCompany"></div>
      <div class="job-url" id="jobUrl"></div>
    </div>

    <button class="btn-capture" id="captureBtn" disabled>
      <span>⚡</span> Capture for Evaluation
    </button>

    <div class="status" id="status"></div>

    <div class="server-warning" id="serverWarning" style="display:none;">
      Dashboard not running. Start it with:<br>
      <code>node dashboard-web/server.mjs</code>
    </div>

    <hr class="divider">

    <div class="quick-stats">
      <div class="stat">
        <div class="stat-value" id="statCaptured">—</div>
        <div class="stat-label">Captured</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statApplied">—</div>
        <div class="stat-label">Applied</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statScore">—</div>
        <div class="stat-label">Avg Score</div>
      </div>
    </div>

    <a href="#" class="settings-link" id="dashboardLink">Open Dashboard →</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
